name: Playwright Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * *"   # Daily at 6:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Create .env file from secrets
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL || 'https://reqres.in' }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'https://reqres.in' }}" >> .env
          echo "TEST_EMAIL=${{ secrets.TEST_EMAIL || 'eve.holt@reqres.in' }}" >> .env
          echo "TEST_PASSWORD=${{ secrets.TEST_PASSWORD || 'cityslicka' }}" >> .env

      - name: Run API tests
        run: |
          pytest tests/api/ -v \
            --html=reports/api-report.html \
            --self-contained-html \
            -n 2 \
            --tb=short
        continue-on-error: true

      - name: Run UI smoke tests
        run: |
          pytest tests/ui/ -v -m smoke \
            --html=reports/ui-report.html \
            --self-contained-html \
            --tb=short
        continue-on-error: true

      - name: Upload HTML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: reports/
          retention-days: 14

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: reports/screenshots/
          retention-days: 7
